{% extends "base.html" %}

{% block content %}
<div class="card">
  <h1>Glossary</h1>
  <p>Quick definitions for common accounting and economics terms.</p>
</div>

<div class="grid">
  {% for item in glossary %}
  <div class="card">
    <h3>{{ item.term }}</h3>
    <p>{{ item.definition }}</p>
  </div>
  {% endfor %}
</div>
{% endblock %}
